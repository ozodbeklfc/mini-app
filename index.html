<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App - Auth</title>
    <!-- Подключаем Telegram Web Apps API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: #2481cc;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #2481cc;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #2481cc;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1c6ba8;
        }

        .toggle-link {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .toggle-link span {
            color: #2481cc;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Класс для скрытия экранов */
        .hidden {
            display: none !important;
        }

        #tg-auto-login {
            background-color: #2481cc;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: SIGN IN -->
    <div id="signin-screen" class="card">
        <h2>Войти в аккаунт</h2>

        <div class="input-group">
            <label>Логин</label>
            <input type="text" id="signin-login" placeholder="UL0110">
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="signin-password" placeholder="••••••••">
        </div>
        <button id="btn-signin">Войти</button>
        <div class="toggle-link">
            Нет аккаунта? <span id="to-signup">Зарегистрироваться</span>
        </div>
    </div>

    <!-- ЭКРАН 2: SIGN UP -->
    <div id="signup-screen" class="card hidden">
        <h2>Регистрация</h2>
        <div class="input-group">
            <label>Имя</label>
            <input type="text" id="signup-name" placeholder="Ozodbek">
        </div>
        <div class="input-group">
            <label>Логин</label>
            <input type="text" id="signup-login" placeholder="UL0110">
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="signup-password" placeholder="••••••••">
        </div>
        <button id="btn-signup">Создать аккаунт</button>
        <div class="toggle-link">
            Уже есть аккаунт? <span id="to-signin">Войти</span>
        </div>
    </div>

    <!-- ЭКРАН 3: ГЛАВНЫЙ ЭКРАН (КЛИКЕР) -->
    <div id="main-screen" class="card hidden">
        <h2 id="greeting">Привет!</h2>
        <div id="counter" style="font-size: 18px; margin: 15px 0;">Кликов: 0</div>
        <button id="click-btn">Нажми меня</button>
        <button id="btn-logout" style="background-color: #e74c3c; margin-top: 30px; padding: 8px;">Выйти</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ТВОЯ ССЫЛКА ИЗ GOOGLE APPS SCRIPT
const BACKEND_URL = 'https://script.google.com/macros/s/ЗАМЕНИ_НА_СВОЙ_ID/exec'; 

const signinScreen = document.getElementById('signin-screen');
const signupScreen = document.getElementById('signup-screen');
const mainScreen = document.getElementById('main-screen');

let currentLogin = null;

document.getElementById('to-signup').addEventListener('click', () => {
    signinScreen.classList.add('hidden');
    signupScreen.classList.remove('hidden');
});

document.getElementById('to-signin').addEventListener('click', () => {
    signupScreen.classList.add('hidden');
    signinScreen.classList.remove('hidden');
});

function openMainScreen(name, clicks) {
    signinScreen.classList.add('hidden');
    signupScreen.classList.add('hidden');
    mainScreen.classList.remove('hidden');
    document.getElementById('greeting').innerText = `Привет, ${name}!`;
    document.getElementById('counter').innerText = `Кликов: ${clicks}`;
}

// 1. РЕГИСТРАЦИЯ
document.getElementById('btn-signup').addEventListener('click', async () => {
    const name = document.getElementById('signup-name').value;
    const login = document.getElementById('signup-login').value;
    const password = document.getElementById('signup-password').value;

    if (!name || !login || !password) return alert('Заполните все поля!');

    try {
        // Отправляем текстовый blob, чтобы обойти жесткие правила CORS в браузерах
        await fetch(BACKEND_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "register", name, login, password })
        });
        
        alert('Учётная запись создана! Теперь войдите.');
        signupScreen.classList.add('hidden');
        signinScreen.classList.remove('hidden');
    } catch (err) {
        alert('Ошибка при отправке данных');
    }
});

// 2. ВХОД
document.getElementById('btn-signin').addEventListener('click', async () => {
    const login = document.getElementById('signin-login').value;
    const password = document.getElementById('signin-password').value;

    if (!login || !password) return alert('Введите логин и пароль!');

    try {
        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "login", login, password })
        });
        const data = await res.json();

        if (data.success) {
            currentLogin = data.user.login;
            openMainScreen(data.user.name, data.user.clicks);
        } else {
            alert(data.detail || 'Неверный логин или пароль');
        }
    } catch (err) {
        alert('Не удалось связаться с таблицей');
    }
});

// 3. КЛИКЕР
const btn = document.getElementById('click-btn');
const counterEl = document.getElementById('counter');

btn.addEventListener('click', async () => {
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    if (!currentLogin) return;

    // Сразу визуально увеличиваем клик для отзывчивости интерфейса
    let currentClicks = parseInt(counterEl.innerText.replace(/\D/g, "")) || 0;
    counterEl.innerText = `Кликов: ${currentClicks + 1}`;

    try {
        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "click", login: currentLogin })
        });
        const data = await res.json();
        if (data.success) {
            counterEl.innerText = `Кликов: ${data.clicks}`;
        }
    } catch (err) {
        console.error('Ошибка сохранения клика');
    }
});

document.getElementById('btn-logout').addEventListener('click', () => {
    currentLogin = null;
    mainScreen.classList.add('hidden');
    signinScreen.classList.remove('hidden');
});
    </script>
</body>
</html>
